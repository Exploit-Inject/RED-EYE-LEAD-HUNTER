<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>RED EYE</title>
  <style>
    body {
      width: 260px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #e6e8ee;
    }

    .wrap {
      padding: 14px;
    }

    h1 {
      font-size: 14px;
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }

    p {
      font-size: 12px;
      color: #8b91a3;
      margin: 0 0 12px;
      line-height: 1.5;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    button {
      flex: 1;
      background: #1a1f2b;
      color: #e6e8ee;
      border: 1px solid #232a3a;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover {
      background: #232a3a;
    }

    .primary {
      background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%);
      border-color: #b91c1c;
      color: #fff;
    }

    .stat {
      font-size: 12px;
      color: #8b91a3;
      margin-top: 8px;
    }

    .stat b {
      color: #e6e8ee;
    }

    .err {
      color: #fca5a5;
      font-size: 11.5px;
      margin-top: 6px;
      min-height: 14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1><span class="dot"></span> RED EYE</h1>
    <p>Open a Google Maps search (e.g. "gym in california") then use the floating panel — or control it from here.</p>
    <div class="row">
      <button class="primary" id="start">▶ Start</button>
      <button id="stop">■ Stop</button>
    </div>
    <div class="row">
      <button id="export">⬇ Export CSV</button>
      <button id="clear">🗑 Clear</button>
    </div>
    <div class="stat"><b id="count">0</b> leads collected</div>
    <div class="err" id="err"></div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
